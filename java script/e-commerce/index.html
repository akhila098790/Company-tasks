<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>My E-Commerce Store</h1>
<a href="login.html">Login</a>
<button onclick="showAll()">All Products</button>
</header>

<div class="container">

<!-- Sidebar -->
<aside>

<h3>Categories</h3>

<ul>
<li onclick="filterProducts('sarees')">Sarees</li>
<li onclick="filterProducts('dresses')">Dresses</li>
<li onclick="filterProducts('shirts')">Shirts</li>
<li onclick="filterProducts('books')">Books</li>
<li onclick="filterProducts('decor')">Home Decor</li>
</ul>

<div id="adminPanel">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">

<select id="pcategory">
<option value="sarees">Sarees</option>
<option value="dresses">Dresses</option>
<option value="shirts">Shirts</option>
<option value="books">Books</option>
<option value="decor">Home Decor</option>
</select>

<input id="pimage" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

</aside>

<!-- Products -->
<main>

<h2>Products</h2>

<div id="products"></div>

<h2>Your Cart</h2>

<ul id="cart"></ul>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
