<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="title">Weather in INDIA</div>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter a city which exists in India (e.g. Pune, Delhi)">
            <button class="search-btn" onclick="searchLocation()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div id="loader" class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Finding city...</div>

        <div id="weatherDisplay">
            <div class="main-info">
                <p>Search for a city which exists in India</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
